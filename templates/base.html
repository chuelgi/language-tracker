<!doctype html>
<html>
<head>
    <title>Language Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: #333;
        }

        a:hover {
            color: #007BFF;
        }

        .card {
    border: 1px solid #ddd;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
}

.progress-bar {
    width: 100%;
    height: 12px;
    background: #eee;
    border-radius: 6px;
    margin-top: 8px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: #4CAF50;
    transition: width 0.3s ease;
}
    </style>
</head>

<body>

<nav>
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('add_language') }}">Add Language</a>
    <a href="{{ url_for('add_log') }}">Add Log</a>
</nav>

{% block content %}{% endblock %}

</body>
</html>
