<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StudyFlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          darkMode: 'class'
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body
  id="body"
  class="theme min-h-screen bg-gradient-to-br from-[#faf5ff] via-[#fdf2f8] to-[#f3e8ff] dark:from-zinc-950 dark:via-zinc-900 dark:to-zinc-950 text-gray-800 dark:text-white transition-all duration-300"
>
<!-- BUBBLE NAVBAR -->
<div class="fixed top-4 left-1/2 -translate-x-1/2 z-50">
    <nav class="nav-bubble">

        <div class="nav-left">
            <h1 class="logo">
                StudyFlow
            </h1>
        </div>

        <div class="nav-links">
            <a href="{{ url_for('index') }}">Dashboard</a>
            <a href="{{ url_for('timer') }}">Timer</a>


            {% if current_user.is_authenticated %}
               <a href="{{ url_for('show_topics') }}">My Logs</a>
               <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a class="register-btn" href="{{ url_for('register') }}">Register</a>
            {% endif %}

            <button id="themeBtn" onclick="toggleTheme()" class="theme-btn">
                🌙
            </button>
        </div>

    </nav>
</div>
{% block content %}
{% endblock %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
window.addEventListener("DOMContentLoaded", () => {

    const audio = document.getElementById("loginSound");

    if (!audio) return;

    audio.volume = 0.5;

    // Try autoplay
    audio.play().catch(() => {
        console.log("Autoplay blocked — waiting for interaction");

        // fallback: play on first click
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });

    });

});
</script>

</body>
</html>
