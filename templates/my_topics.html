{% extends "base.html" %}

{% block content %}

<div class="form-page">

    <div class="form-card" style="max-width: 800px;">


        <h1 class="form-title">
            Topics 📚
        </h1>

        <div class="study-form">

            {% for topic in topics %}

            <a
                href="{{ url_for('get_topic_logs', topic_id=topic.id) }}"
                class="log-item"
                style="text-decoration: none; color: inherit;"
            >

                <div>

                    <h3 style="font-weight:700; font-size:18px;">
                        {{ topic.name }}
                    </h3>

                    <p style="opacity:0.7;">
                        View Logs
                    </p>

                </div>


            </a>

            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
