{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<!-- 🔹 Language list + progress -->
{% for row in totals %}
  <div class="card">

    <!-- Link to language page -->
    <a href="{{ url_for('lang', lang_id=row['id']) }}">
      <strong>{{ row["name"] }}</strong>
    </a>

    <!-- Hours display -->
    <div>
      {{ row["total_hours"] or 0 }} / {{ goal }} hours
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill"
           style="width: {{ ((row['total_hours'] or 0) / goal * 100) }}%;">
      </div>
    </div>

  </div>
{% endfor %}

<hr>

<!-- 🔹 Pie Chart -->
<h2>Language Distribution</h2>
<canvas id="langChart" width="400" height="400"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('langChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: {{ labels | tojson }},
        datasets: [{
            label: 'Hours',
            data: {{ values | tojson }},
            backgroundColor: [
                '#4CAF50',
                '#2196F3',
                '#FFC107',
                '#FF5722',
                '#9C27B0',
                '#00BCD4'
            ]
        }]
    }
});
</script>

{% endblock %}
