{% extends "base.html" %}

{% block content %}

<div class="form-page">

    <div class="form-card" style="max-width: 800px;">

        <h1 class="form-title">
            {{ topic.name }} 📚
        </h1>

        <div class="study-form">

            {% for log in logs %}

            <a
                href="{{ url_for('get_log', log_id=log.id) }}"
                class="log-item"
                style="text-decoration: none; color: inherit;"
            >

                <div>

                    <h3 style="font-weight:700; font-size:18px;">
                        {{ log.title }}
                    </h3>

                    <p style="opacity:0.7;">
                        Study Session
                    </p>

                </div>


                <span
                    class="register-btn"
                    style="display:flex; align-items:center;"
                >
                    {{ log.hours }} hrs
                </span>

            </a>

            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
