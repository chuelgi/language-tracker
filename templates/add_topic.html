{% extends "base.html" %}

{% block content %}

<div class="form-page">

    <div class="form-card">

        <h1 class="form-title">
            Add Topic 📚
        </h1>

        <form method="POST" class="study-form">

            {{ form.hidden_tag() }}

            <div class="form-group">
                {{ form.name.label(class="form-label") }}

                {{ form.name(class="form-input") }}
            </div>


            {{ form.submit(class="submit-btn") }}

        </form>

    </div>

</div>

{% endblock %}
