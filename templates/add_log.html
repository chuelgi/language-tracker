{% extends "base.html" %}

{% block content %}

<h1>Add Log</h1>
<form method="POST">
    {{ form.hidden_tag() }}

    <p>
        {{ form.hours.label }}<br>
        {{ form.hours() }}
    </p>

    <p>
        {{ form.topic.label }}<br>
        {{ form.topic() }}
    </p>

    <p>
        {{ form.new_topic.label }}<br>
        {{ form.new_topic() }}
    </p>

    <p>
        {{ form.context.label }}<br>
        {{ form.context() }}
    </p>

    {{ form.submit() }}

{% endblock %}
